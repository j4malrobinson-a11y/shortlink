dataSources:
  # 定义数据源，这里使用一个默认的数据源
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/shortlink?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 1019fxmm

rules:
  - !SHARDING
    # 配置t_link表的分片规则
    tables:
      t_link:
        # 实际数据节点，表示t_user表的数据分布在ds_0.t_link_0到ds_0.t_link_15这16张表中
        actualDataNodes: ds_0.t_link_${0..15}

        # 分表策略
        tableStrategy:
          standard:
            # 分片键，这里使用username的hashcode进行分片
            shardingColumn: gid
            # 分片算法，将数据路由到16张分表中
            shardingAlgorithmName: t_link_table_sharding_algorithm

    # 配置分片算法
    shardingAlgorithms:
      # t_link表的分表算法
      t_link_table_sharding_algorithm:
        type: HASH_MOD
        props:
          # 分片数量，对应16张表
          sharding-count: '16'
props:
  # 是否在日志中打印SQL解析和改写信息
  sql-show: true
  # 是否在日志中打印简单SQL，默认为false
  sql-simple: false